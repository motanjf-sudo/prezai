<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrezAI - ساخت پرزنتیشن هوشمند</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060d1a;
    --surface: #0d1b2e;
    --surface2: #112240;
    --border: #1e3a5f;
    --primary: #2563eb;
    --accent: #f59e0b;
    --accent2: #10b981;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --danger: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Vazirmatn', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at 20% 20%, #0a2040 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, #0a1a30 0%, transparent 50%); pointer-events: none; z-index: 0; }
  .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }
  .header { text-align: center; margin-bottom: 50px; animation: fadeDown 0.8s ease; }
  .logo { font-size: 48px; font-weight: 900; background: linear-gradient(135deg, #2563eb, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -2px; margin-bottom: 8px; }
  .logo span { background: linear-gradient(135deg, #f59e0b, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .tagline { color: var(--text-muted); font-size: 16px; font-weight: 300; }
  .api-section { background: linear-gradient(135deg, #0d1b2e, #112240); border: 1px solid var(--accent); border-radius: 16px; padding: 24px; margin-bottom: 32px; animation: fadeUp 0.6s ease 0.1s both; }
  .api-section-title { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; font-size: 15px; font-weight: 700; color: var(--accent); }
  .api-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 36px; margin-bottom: 24px; animation: fadeUp 0.6s ease 0.2s both; }
  .form-section-title { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 8px; }
  label { font-size: 13px; font-weight: 500; color: var(--text-muted); }
  label .required { color: var(--accent); margin-right: 4px; }
  input, textarea, select { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: 'Vazirmatn', sans-serif; font-size: 14px; outline: none; transition: all 0.2s; width: 100%; }
  input:focus, textarea:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  input::placeholder, textarea::placeholder { color: var(--text-muted); opacity: 0.5; }
  select option { background: var(--surface2); }
  .section-divider { height: 1px; background: var(--border); margin: 28px 0; }
  .submit-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #1d4ed8, #2563eb); border: none; border-radius: 14px; color: white; font-family: 'Vazirmatn', sans-serif; font-size: 17px; font-weight: 700; cursor: pointer; transition: all 0.3s; animation: fadeUp 0.6s ease 0.4s both; }
  .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(37,99,235,0.4); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .progress-section { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px; margin-top: 24px; }
  .progress-section.visible { display: block; animation: fadeUp 0.5s ease; }
  .progress-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: var(--accent); display: flex; align-items: center; gap: 10px; }
  .spinner { width: 20px; height: 20px; border: 2px solid rgba(245,158,11,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
  .progress-log { background: #040a12; border-radius: 10px; padding: 16px; font-size: 13px; line-height: 2; max-height: 200px; overflow-y: auto; font-family: monospace; }
  .log-line { display: flex; gap: 10px; }
  .log-line .dot { color: var(--accent2); }
  .log-line.error .dot { color: var(--danger); }
  .result-section { display: none; background: linear-gradient(135deg, #0a2010, #0d2a15); border: 1px solid var(--accent2); border-radius: 20px; padding: 32px; margin-top: 24px; text-align: center; }
  .result-section.visible { display: block; animation: fadeUp 0.5s ease; }
  .result-icon { font-size: 48px; margin-bottom: 16px; }
  .result-title { font-size: 22px; font-weight: 700; color: var(--accent2); margin-bottom: 8px; }
  .result-desc { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
  .download-btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 32px; background: var(--accent2); border: none; border-radius: 12px; color: white; font-family: 'Vazirmatn', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; text-decoration: none; transition: all 0.3s; }
  .download-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16,185,129,0.3); }
  .error-section { display: none; background: linear-gradient(135deg, #1a0a0a, #2a0d0d); border: 1px solid var(--danger); border-radius: 16px; padding: 24px; margin-top: 24px; }
  .error-section.visible { display: block; animation: fadeUp 0.5s ease; }
  .error-title { color: var(--danger); font-weight: 700; margin-bottom: 8px; }
  .error-msg { color: var(--text-muted); font-size: 13px; }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 600px) { .form-grid, .api-grid { grid-template-columns: 1fr; } .form-grid.three { grid-template-columns: 1fr 1fr; } .form-card { padding: 20px; } }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">Prez<span>AI</span></div>
    <div class="tagline">پرزنتیشن حرفه‌ای با هوش مصنوعی — در چند ثانیه</div>
  </div>

  <div class="api-section">
    <div class="api-section-title">🔑 کلیدهای API</div>
    <div class="api-grid">
      <div class="form-group">
        <label>Anthropic API Key <span style="color:var(--text-muted);font-size:11px">(برای Claude)</span></label>
        <input type="password" id="anthropicKey" placeholder="sk-ant-..." />
      </div>
      <div class="form-group">
        <label>Gemini API Key <span style="color:var(--text-muted);font-size:11px">(برای تصاویر)</span></label>
        <input type="password" id="geminiKey" placeholder="AIza..." />
      </div>
    </div>
  </div>

  <div class="form-card">
    <div class="form-section-title">📋 اطلاعات پایه</div>
    <div class="form-grid">
      <div class="form-group">
        <label><span class="required">*</span>موضوع اصلی</label>
        <input type="text" id="topic" placeholder="مثلا: اهمیت ورزش روزانه" />
      </div>
      <div class="form-group">
        <label>زیر موضوع</label>
        <input type="text" id="subtopic" placeholder="جزئیات بیشتر..." />
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>مخاطب</label>
        <input type="text" id="audience" placeholder="مثلا: جوانان ۲۰ تا ۳۰ ساله" />
      </div>
      <div class="form-group">
        <label>هدف پرزنتیشن</label>
        <select id="goal">
          <option value="">انتخاب کنید...</option>
          <option value="انگیزشی">انگیزشی</option>
          <option value="آموزشی">آموزشی</option>
          <option value="فروش">فروش و بازاریابی</option>
          <option value="معرفی">معرفی محصول/خدمت</option>
          <option value="گزارش">گزارش</option>
        </select>
      </div>
    </div>

    <div class="section-divider"></div>
    <div class="form-section-title">🎨 سبک بصری</div>
    <div class="form-grid three">
      <div class="form-group">
        <label>سبک تصویر</label>
        <select id="style">
          <option value="modern professional infographic">مدرن و حرفه‌ای</option>
          <option value="cartoon colorful">کارتونی رنگارنگ</option>
          <option value="cinematic dark">سینمایی تیره</option>
          <option value="minimal clean">مینیمال</option>
          <option value="bold colorful">پررنگ و جذاب</option>
        </select>
      </div>
      <div class="form-group">
        <label>لحن</label>
        <select id="tone">
          <option value="حرفه‌ای">حرفه‌ای</option>
          <option value="دوستانه">دوستانه</option>
          <option value="انگیزشی">انگیزشی</option>
          <option value="علمی">علمی</option>
        </select>
      </div>
      <div class="form-group">
        <label>تعداد اسلاید</label>
        <select id="slides">
          <option value="3">۳ اسلاید</option>
          <option value="5" selected>۵ اسلاید</option>
          <option value="7">۷ اسلاید</option>
        </select>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>رنگ اصلی</label>
        <select id="color">
          <option value="deep blue">آبی تیره</option>
          <option value="emerald green">سبز زمردی</option>
          <option value="dark purple">بنفش تیره</option>
          <option value="crimson red">قرمز</option>
          <option value="golden yellow">طلایی</option>
        </select>
      </div>
      <div class="form-group">
        <label>تم</label>
        <select id="theme">
          <option value="dark">تیره (Dark)</option>
          <option value="light">روشن (Light)</option>
        </select>
      </div>
    </div>

    <div class="section-divider"></div>
    <div class="form-section-title">🏷️ اطلاعات برند</div>
    <div class="form-grid">
      <div class="form-group">
        <label>نام برند یا شخص</label>
        <input type="text" id="brand" placeholder="مثلا: دکتر احمدی" />
      </div>
      <div class="form-group">
        <label>هشتگ‌ها</label>
        <input type="text" id="hashtags" placeholder="مثلا: #ورزش #سلامتی" />
      </div>
    </div>
    <div class="form-grid three">
      <div class="form-group">
        <label>اینستاگرام</label>
        <input type="text" id="instagram" placeholder="@username" />
      </div>
      <div class="form-group">
        <label>تلفن</label>
        <input type="text" id="phone" placeholder="۰۹۱۲..." />
      </div>
      <div class="form-group">
        <label>سایت</label>
        <input type="text" id="website" placeholder="www.site.com" />
      </div>
    </div>
  </div>

  <button class="submit-btn" onclick="buildPresentation()">✨ ساخت پرزنتیشن با هوش مصنوعی</button>

  <div class="progress-section" id="progressSection">
    <div class="progress-title"><div class="spinner"></div>در حال ساخت پرزنتیشن...</div>
    <div class="progress-log" id="progressLog"></div>
  </div>

  <div class="result-section" id="resultSection">
    <div class="result-icon">🎉</div>
    <div class="result-title">پرزنتیشن آماده شد!</div>
    <div class="result-desc">فایل PowerPoint شما آماده دانلود است</div>
    <a class="download-btn" id="downloadBtn" href="#" download="PrezAI.pptx">⬇️ دانلود PowerPoint</a>
  </div>

  <div class="error-section" id="errorSection">
    <div class="error-title">❌ خطا</div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

</div>

<script>
function log(msg, type='normal') {
  const logEl = document.getElementById('progressLog');
  const line = document.createElement('div');
  line.className = 'log-line ' + type;
  line.innerHTML = `<span class="dot">▶</span><span>${msg}</span>`;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

function showProgress() {
  document.getElementById('progressSection').classList.add('visible');
  document.getElementById('resultSection').classList.remove('visible');
  document.getElementById('errorSection').classList.remove('visible');
  document.getElementById('progressLog').innerHTML = '';
}

function showError(msg) {
  document.getElementById('errorSection').classList.add('visible');
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('progressSection').classList.remove('visible');
}

async function callClaude(apiKey, prompt, maxTokens=1500) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: maxTokens,
      messages: [{role:'user', content: prompt}]
    })
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error('Claude: ' + (err.error?.message || res.status));
  }
  const data = await res.json();
  return data.content[0].text;
}

async function callGeminiImage(apiKey, prompt) {
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-002:predict?key=${apiKey}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      instances: [{prompt: prompt}],
      parameters: {sampleCount: 1, aspectRatio: "16:9"}
    })
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error('Gemini: ' + (err.error?.message || res.status));
  }
  const data = await res.json();
  return data.predictions[0].bytesBase64Encoded;
}

function parseJSON(text) {
  const start = text.indexOf('{');
  const end = text.lastIndexOf('}') + 1;
  return JSON.parse(text.slice(start, end));
}

async function buildPresentation() {
  const anthropicKey = document.getElementById('anthropicKey').value.trim();
  const geminiKey = document.getElementById('geminiKey').value.trim();
  const topic = document.getElementById('topic').value.trim();

  if (!anthropicKey) { alert('لطفا Anthropic API Key را وارد کنید'); return; }
  if (!topic) { alert('لطفا موضوع را وارد کنید'); return; }

  const userData = {
    topic,
    subtopic: document.getElementById('subtopic').value,
    audience: document.getElementById('audience').value,
    goal: document.getElementById('goal').value,
    style: document.getElementById('style').value,
    tone: document.getElementById('tone').value,
    slides: parseInt(document.getElementById('slides').value),
    color: document.getElementById('color').value,
    theme: document.getElementById('theme').value,
    brand: document.getElementById('brand').value,
    hashtags: document.getElementById('hashtags').value,
    instagram: document.getElementById('instagram').value,
    phone: document.getElementById('phone').value,
    website: document.getElementById('website').value,
  };

  document.querySelector('.submit-btn').disabled = true;
  showProgress();

  try {
    log('مرحله ۱: Claude در حال تحلیل و طراحی ساختار...');

    const structurePrompt = `You are a world-class presentation designer. Create a stunning presentation structure.
Topic: ${userData.topic}
Subtopic: ${userData.subtopic}
Audience: ${userData.audience}
Goal: ${userData.goal}
Slides: ${userData.slides}
Color theme: ${userData.color}
Visual style: ${userData.style}
Tone: ${userData.tone}

Return ONLY this JSON (no extra text):
{
  "palette": {"background":"#hex","primary":"#hex","secondary":"#hex","accent":"#hex","text":"#hex"},
  "slides": [{"number":1,"title":"slide title in Persian","focus":"main point","image_prompt":"detailed English prompt for a stunning image for this slide, ${userData.style} style"}]
}`;

    const structureText = await callClaude(anthropicKey, structurePrompt, 1000);
    const structure = parseJSON(structureText);
    log(`ساختار آماده: ${structure.slides.length} اسلاید`, 'success');

    const allSlides = [];

    for (let i = 0; i < structure.slides.length; i++) {
      const slide = structure.slides[i];
      log(`اسلاید ${i+1}: Claude در حال طراحی المان‌ها...`);

      const elemPrompt = `Design ONE professional infographic slide. Canvas 1280x720px.
Slide title: ${slide.title}
Focus: ${slide.focus}
Style: ${userData.style}
Brand: ${userData.brand || ''}
Hashtags: ${userData.hashtags || ''}
Instagram: ${userData.instagram || ''}
Phone: ${userData.phone || ''}
Palette: bg=${structure.palette.background}, primary=${structure.palette.primary}, accent=${structure.palette.accent}, text=${structure.palette.text}

Create a RICH infographic layout with multiple elements like a professional consulting slide.
Use: header_band, footer_band, rect, text, text_wrapped, arrow, divider, icon_box, number_highlight, step_boxes

Return ONLY JSON: {"elements":[{"type":"...","x":0,"y":0,...}]}`;

      const elemText = await callClaude(anthropicKey, elemPrompt, 1500);
      const elemData = parseJSON(elemText);
      log(`  ${elemData.elements.length} المان طراحی شد`, 'success');

      let imageBase64 = null;
      if (geminiKey && slide.image_prompt) {
        try {
          log(`  Gemini در حال ساخت تصویر...`);
          imageBase64 = await callGeminiImage(geminiKey, slide.image_prompt);
          log(`  تصویر آماده شد`, 'success');
        } catch(imgErr) {
          log(`  تصویر ساخته نشد: ${imgErr.message}`, 'error');
        }
      }

      allSlides.push({
        palette: structure.palette,
        elements: elemData.elements,
        imageBase64
      });
    }

    log('در حال ساخت فایل PowerPoint...');
    const pptxBlob = await buildPPTX(allSlides);
    const url = URL.createObjectURL(pptxBlob);
    document.getElementById('downloadBtn').href = url;
    document.getElementById('resultSection').classList.add('visible');
    document.getElementById('progressSection').classList.remove('visible');

  } catch(err) {
    showError(err.message);
  } finally {
    document.querySelector('.submit-btn').disabled = false;
  }
}

async function buildPPTX(slides) {
  const slideImages = [];
  for (const slideData of slides) {
    const canvas = document.createElement('canvas');
    canvas.width = 1280; canvas.height = 720;
    const ctx = canvas.getContext('2d');
    const p = slideData.palette;
    ctx.fillStyle = p.background;
    ctx.fillRect(0, 0, 1280, 720);

    if (slideData.imageBase64) {
      try {
        await new Promise((resolve) => {
          const img = new Image();
          img.onload = () => { ctx.drawImage(img, 0, 0, 1280, 720); resolve(); };
          img.onerror = resolve;
          img.src = 'data:image/png;base64,' + slideData.imageBase64;
        });
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(0, 0, 1280, 720);
      } catch(e) {}
    }

    for (const elem of slideData.elements) {
      try { await drawElement(ctx, elem, p); } catch(e) {}
    }
    slideImages.push(canvas.toDataURL('image/png').split(',')[1]);
  }
  return createPPTXBlob(slideImages);
}

async function drawElement(ctx, elem, palette) {
  const t = elem.type;
  const x = +elem.x||0, y = +elem.y||0, w = +elem.w||100, h = +elem.h||50;
  const color = elem.color || palette.primary;
  const radius = +elem.radius||8;

  if (t==='header_band') { ctx.fillStyle=color; ctx.fillRect(0,y,1280,h); }
  else if (t==='footer_band') { ctx.fillStyle=color; ctx.fillRect(0,720-h,1280,h); }
  else if (t==='rect') { roundRect(ctx,x,y,w,h,radius,color,elem.border); }
  else if (t==='text') {
    ctx.fillStyle=color;
    ctx.font=`${elem.bold?'bold ':''} ${elem.size||18}px Vazirmatn,Arial`;
    ctx.fillText(elem.text||'',x,y+(+elem.size||18));
  }
  else if (t==='text_wrapped') {
    ctx.fillStyle=color;
    ctx.font=`${elem.size||16}px Vazirmatn,Arial`;
    wrapText(ctx,elem.text||'',x,y,elem.max_w||300,(+elem.size||16)+6);
  }
  else if (t==='arrow') { drawArrow(ctx,x,y,+elem.x2||x+100,+elem.y2||y,color,+elem.line_width||2); }
  else if (t==='divider') { ctx.fillStyle=color; ctx.fillRect(x,y,w,+elem.thickness||2); }
  else if (t==='icon_box') {
    roundRect(ctx,x,y,w,h,radius,elem.box_color||palette.primary);
    ctx.fillStyle=elem.text_color||'#fff';
    ctx.font=`bold ${elem.title_size||16}px Vazirmatn,Arial`;
    ctx.fillText(elem.title||'',x+10,y+28);
    ctx.font=`${elem.body_size||13}px Vazirmatn,Arial`;
    ctx.fillText(elem.body||'',x+10,y+52);
  }
  else if (t==='number_highlight') {
    roundRect(ctx,x,y,w,h,radius,elem.box_color||palette.accent);
    ctx.fillStyle=elem.number_color||'#fff';
    ctx.font=`bold ${elem.number_size||48}px Vazirmatn,Arial`;
    ctx.fillText(String(elem.number||''),x+10,y+60);
    ctx.fillStyle=elem.label_color||'#fff';
    ctx.font=`${elem.label_size||14}px Vazirmatn,Arial`;
    ctx.fillText(elem.label||'',x+10,y+h-10);
  }
  else if (t==='step_boxes') {
    const steps=elem.steps||[], sw=+elem.step_w||180, sh=+elem.step_h||100, gap=+elem.gap||40;
    const colors=elem.colors||[palette.primary,palette.accent];
    for (let i=0;i<steps.length;i++) {
      const sx=x+i*(sw+gap);
      roundRect(ctx,sx,y,sw,sh,10,colors[i%colors.length]);
      ctx.fillStyle='#fff';
      ctx.font='bold 14px Vazirmatn,Arial';
      ctx.fillText(steps[i].title||'',sx+10,y+24);
      ctx.font='12px Vazirmatn,Arial';
      ctx.fillText(steps[i].body||'',sx+10,y+46);
      if (i<steps.length-1) drawArrow(ctx,sx+sw+5,y+sh/2,sx+sw+gap-5,y+sh/2,'#fff',2);
    }
  }
}

function roundRect(ctx,x,y,w,h,r,fill,stroke) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  ctx.fillStyle=fill; ctx.fill();
  if(stroke){ctx.strokeStyle=stroke;ctx.stroke();}
}

function wrapText(ctx,text,x,y,maxW,lineH) {
  const words=text.split(' '); let line='', cy=y+lineH;
  for (const word of words) {
    const test=line+word+' ';
    if (ctx.measureText(test).width>maxW&&line) { ctx.fillText(line,x,cy); line=word+' '; cy+=lineH; }
    else line=test;
  }
  ctx.fillText(line,x,cy);
}

function drawArrow(ctx,x1,y1,x2,y2,color,lw) {
  ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth=lw;
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  const angle=Math.atan2(y2-y1,x2-x1), s=10;
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-s*Math.cos(angle-0.4),y2-s*Math.sin(angle-0.4));
  ctx.lineTo(x2-s*Math.cos(angle+0.4),y2-s*Math.sin(angle+0.4));
  ctx.closePath(); ctx.fill();
}

function createPPTXBlob(imageBase64Array) {
  const files = {};
  const n = imageBase64Array.length;

  let ct = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Default Extension="png" ContentType="image/png"/><Override PartName="/ppt/presentation.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.presentation.main+xml"/><Override PartName="/ppt/slideLayouts/slideLayout1.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slideLayout+xml"/><Override PartName="/ppt/slideMasters/slideMaster1.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slideMaster+xml"/>`;
  for (let i=1;i<=n;i++) ct+=`<Override PartName="/ppt/slides/slide${i}.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slide+xml"/>`;
  ct+=`</Types>`;
  files['[Content_Types].xml']=ct;

  files['_rels/.rels']=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="ppt/presentation.xml"/></Relationships>`;

  let sldIds='';
  for (let i=1;i<=n;i++) sldIds+=`<p:sldId id="${256+i}" r:id="rId${i}"/>`;
  files['ppt/presentation.xml']=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><p:presentation xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"><p:sldMasterIdLst><p:sldMasterId id="2147483648" r:id="rIdM1"/></p:sldMasterIdLst><p:sldSz cx="9144000" cy="5143500"/><p:notesSz cx="6858000" cy="9144000"/><p:sldIdLst>${sldIds}</p:sldIdLst></p:presentation>`;

  let presRels=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rIdM1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slideMaster" Target="slideMasters/slideMaster1.xml"/>`;
  for (let i=1;i<=n;i++) presRels+=`<Relationship Id="rId${i}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slide" Target="slides/slide${i}.xml"/>`;
  presRels+=`</Relationships>`;
  files['ppt/_rels/presentation.xml.rels']=presRels;

  files['ppt/slideMasters/slideMaster1.xml']=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><p:sldMaster xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"><p:cSld><p:spTree><p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr><p:grpSpPr/></p:spTree></p:cSld><p:clrMap bg1="lt1" tx1="dk1" bg2="lt2" tx2="dk2" accent1="accent1" accent2="accent2" accent3="accent3" accent4="accent4" accent5="accent5" accent6="accent6" hlink="hlink" folHlink="folHlink"/><p:sldLayoutIdLst><p:sldLayoutId id="2147483649" r:id="rId1"/></p:sldLayoutIdLst></p:sldMaster>`;
  files['ppt/slideMasters/_rels/slideMaster1.xml.rels']=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slideLayout" Target="../slideLayouts/slideLayout1.xml"/></Relationships>`;
  files['ppt/slideLayouts/slideLayout1.xml']=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><p:sldLayout xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" type="blank"><p:cSld><p:spTree><p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr><p:grpSpPr/></p:spTree></p:cSld></p:sldLayout>`;
  files['ppt/slideLayouts/_rels/slideLayout1.xml.rels']=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slideMaster" Target="../slideMasters/slideMaster1.xml"/></Relationships>`;

  for (let i=1;i<=n;i++) {
    files[`ppt/media/image${i}.png`]=imageBase64Array[i-1];
    files[`ppt/slides/slide${i}.xml`]=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><p:sld xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"><p:cSld><p:spTree><p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr><p:grpSpPr/><p:pic><p:nvPicPr><p:cNvPr id="2" name="img"/><p:cNvPicPr><a:picLocks noChangeAspect="1"/></p:cNvPicPr><p:nvPr/></p:nvPicPr><p:blipFill><a:blip r:embed="rId1"/><a:stretch><a:fillRect/></a:stretch></p:blipFill><p:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="9144000" cy="5143500"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></p:spPr></p:pic></p:spTree></p:cSld></p:sld>`;
    files[`ppt/slides/_rels/slide${i}.xml.rels`]=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="../media/image${i}.png"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slideLayout" Target="../slideLayouts/slideLayout1.xml"/></Relationships>`;
  }

  return buildZip(files);
}

function buildZip(files) {
  const parts=[], cd=[];
  let offset=0;
  const enc=new TextEncoder();
  function b64(s){const b=atob(s);const u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
  function u32(n){return[n&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>24)&0xFF];}
  function u16(n){return[n&0xFF,(n>>8)&0xFF];}
  function crc32(d){let c=0xFFFFFFFF;const t=[];for(let i=0;i<256;i++){let x=i;for(let j=0;j<8;j++)x=(x&1)?(0xEDB88320^(x>>>1)):(x>>>1);t[i]=x;}for(let i=0;i<d.length;i++)c=t[(c^d[i])&0xFF]^(c>>>8);return(c^0xFFFFFFFF)>>>0;}

  for (const [name,content] of Object.entries(files)) {
    const nb=enc.encode(name);
    const data=name.endsWith('.png')?b64(content):enc.encode(content);
    const crc=crc32(data);
    const local=new Uint8Array([0x50,0x4B,0x03,0x04,...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),...u32(crc),...u32(data.length),...u32(data.length),...u16(nb.length),...u16(0),...nb,...data]);
    parts.push(local);
    cd.push({nb,crc,size:data.length,offset});
    offset+=local.length;
  }

  const cdParts=[]; let cdSize=0;
  for (const e of cd) {
    const entry=new Uint8Array([0x50,0x4B,0x01,0x02,...u16(20),...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),...u32(e.crc),...u32(e.size),...u32(e.size),...u16(e.nb.length),...u16(0),...u16(0),...u16(0),...u16(0),...u32(0),...u32(e.offset),...e.nb]);
    cdParts.push(entry); cdSize+=entry.length;
  }
  const eocd=new Uint8Array([0x50,0x4B,0x05,0x06,...u16(0),...u16(0),...u16(cd.length),...u16(cd.length),...u32(cdSize),...u32(offset),...u16(0)]);
  const all=[...parts,...cdParts,eocd];
  const total=all.reduce((s,p)=>s+p.length,0);
  const result=new Uint8Array(total); let pos=0;
  for (const p of all){result.set(p,pos);pos+=p.length;}
  return new Blob([result],{type:'application/vnd.openxmlformats-officedocument.presentationml.presentation'});
}
