<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrezAI - ساخت پرزنتیشن هوشمند</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#060d1a;--surface:#0d1b2e;--surface2:#112240;--border:#1e3a5f;--primary:#2563eb;--accent:#f59e0b;--accent2:#10b981;--text:#e2e8f0;--text-muted:#64748b;--danger:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Vazirmatn',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:40px 20px}
.header{text-align:center;margin-bottom:50px}
.logo{font-size:48px;font-weight:900;background:linear-gradient(135deg,#2563eb,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-2px;margin-bottom:8px}
.logo span{background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tagline{color:var(--text-muted);font-size:16px}
.api-section{background:linear-gradient(135deg,#0d1b2e,#112240);border:1px solid var(--accent);border-radius:16px;padding:24px;margin-bottom:32px}
.api-title{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:16px}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px;margin-bottom:24px}
.section-title{font-size:13px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.group{display:flex;flex-direction:column;gap:8px}
label{font-size:13px;font-weight:500;color:var(--text-muted)}
.req{color:var(--accent)}
input,select{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:'Vazirmatn',sans-serif;font-size:14px;outline:none;transition:all 0.2s;width:100%}
input:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
input::placeholder{color:var(--text-muted);opacity:0.5}
select option{background:var(--surface2)}
.divider{height:1px;background:var(--border);margin:28px 0}
.btn{width:100%;padding:18px;background:linear-gradient(135deg,#1d4ed8,#2563eb);border:none;border-radius:14px;color:white;font-family:'Vazirmatn',sans-serif;font-size:17px;font-weight:700;cursor:pointer;transition:all 0.3s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(37,99,235,0.4)}
.btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.progress{display:none;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;margin-top:24px}
.progress.show{display:block}
.prog-title{font-size:16px;font-weight:700;margin-bottom:20px;color:var(--accent);display:flex;align-items:center;gap:10px}
.spinner{width:20px;height:20px;border:2px solid rgba(245,158,11,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
.log{background:#040a12;border-radius:10px;padding:16px;font-size:13px;line-height:2;max-height:250px;overflow-y:auto;font-family:monospace}
.log-line{display:flex;gap:10px}
.dot{color:var(--accent2)}
.dot.err{color:var(--danger)}
.result{display:none;background:linear-gradient(135deg,#0a2010,#0d2a15);border:1px solid var(--accent2);border-radius:20px;padding:32px;margin-top:24px;text-align:center}
.result.show{display:block}
.res-icon{font-size:48px;margin-bottom:16px}
.res-title{font-size:22px;font-weight:700;color:var(--accent2);margin-bottom:8px}
.res-desc{color:var(--text-muted);font-size:14px;margin-bottom:24px}
.dl-btn{display:inline-flex;align-items:center;gap:10px;padding:14px 32px;background:var(--accent2);border:none;border-radius:12px;color:white;font-family:'Vazirmatn',sans-serif;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;transition:all 0.3s}
.dl-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(16,185,129,0.3)}
.error{display:none;background:linear-gradient(135deg,#1a0a0a,#2a0d0d);border:1px solid var(--danger);border-radius:16px;padding:24px;margin-top:24px}
.error.show{display:block}
.err-title{color:var(--danger);font-weight:700;margin-bottom:8px}
.err-msg{color:var(--text-muted);font-size:13px;word-break:break-all}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr}.form-card{padding:20px}}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <div class="logo">Prez<span>AI</span></div>
  <div class="tagline">پرزنتیشن حرفه‌ای با هوش مصنوعی</div>
</div>
<div class="api-section">
  <div class="api-title">🔑 کلید هوش مصنوعی</div>
  <div class="group">
    <label>کلید کلود (Anthropic)</label>
    <input type="password" id="claudeKey" placeholder="sk-ant-..." />
  </div>
</div>
<div class="form-card">
  <div class="section-title">📋 اطلاعات پایه</div>
  <div class="grid2">
    <div class="group"><label><span class="req">*</span> موضوع اصلی</label><input type="text" id="topic" placeholder="مثلاً: اهمیت ورزش روزانه" /></div>
    <div class="group"><label>زیر موضوع</label><input type="text" id="subtopic" placeholder="جزئیات بیشتر..." /></div>
  </div>
  <div class="grid2">
    <div class="group"><label>مخاطب</label><input type="text" id="audience" placeholder="مثلاً: جوانان ۲۰ تا ۳۰ ساله" /></div>
    <div class="group"><label>هدف</label><select id="goal"><option value="">انتخاب کنید...</option><option value="انگیزشی">انگیزشی</option><option value="آموزشی">آموزشی</option><option value="فروش">فروش و بازاریابی</option><option value="معرفی">معرفی محصول</option><option value="گزارش">گزارش</option></select></div>
  </div>
  <div class="divider"></div>
  <div class="section-title">🎨 سبک بصری</div>
  <div class="grid3">
    <div class="group"><label>سبک</label><select id="style"><option value="modern professional">مدرن و حرفه‌ای</option><option value="colorful energetic">رنگارنگ و پرانرژی</option><option value="dark premium">تیره و لوکس</option><option value="minimal clean">مینیمال</option></select></div>
    <div class="group"><label>لحن</label><select id="tone"><option value="حرفه‌ای">حرفه‌ای</option><option value="دوستانه">دوستانه</option><option value="انگیزشی">انگیزشی</option><option value="علمی">علمی</option></select></div>
    <div class="group"><label>تعداد اسلاید</label><select id="slides"><option value="3">۳ اسلاید</option><option value="5" selected>۵ اسلاید</option><option value="7">۷ اسلاید</option></select></div>
  </div>
  <div class="grid2">
    <div class="group"><label>رنگ اصلی</label><select id="color"><option value="deep blue navy">آبی تیره</option><option value="emerald green">سبز زمردی</option><option value="dark purple">بنفش تیره</option><option value="crimson red">قرمز</option><option value="golden amber">طلایی</option><option value="teal">فیروزه‌ای</option></select></div>
    <div class="group"><label>تم</label><select id="theme"><option value="dark">تیره</option><option value="light">روشن</option></select></div>
  </div>
  <div class="divider"></div>
  <div class="section-title">🏷️ اطلاعات برند</div>
  <div class="grid2">
    <div class="group"><label>نام برند یا شخص</label><input type="text" id="brand" placeholder="مثلاً: دکتر احمدی" /></div>
    <div class="group"><label>هشتگ‌ها</label><input type="text" id="hashtags" placeholder="مثلاً: #ورزش #سلامتی" /></div>
  </div>
  <div class="grid3">
    <div class="group"><label>اینستاگرام</label><input type="text" id="instagram" placeholder="@username" /></div>
    <div class="group"><label>تلفن</label><input type="text" id="phone" placeholder="۰۹۱۲..." /></div>
    <div class="group"><label>سایت</label><input type="text" id="website" placeholder="www.site.com" /></div>
  </div>
</div>
<button class="btn" onclick="build()">✨ ساخت پرزنتیشن با هوش مصنوعی</button>
<div class="progress" id="prog">
  <div class="prog-title"><div class="spinner"></div>در حال ساخت پرزنتیشن...</div>
  <div class="log" id="logEl"></div>
</div>
<div class="result" id="res">
  <div class="res-icon">🎉</div>
  <div class="res-title">پرزنتیشن آماده شد!</div>
  <div class="res-desc">فایل پاورپوینت شما آماده دانلود است</div>
  <a class="dl-btn" id="dlBtn" href="#" download="PrezAI.pptx">⬇️ دانلود پاورپوینت</a>
</div>
<div class="error" id="errEl">
  <div class="err-title">❌ خطا</div>
  <div class="err-msg" id="errMsg"></div>
</div>
</div>

<script>
const W=1280, H=720;

function addLog(msg,isErr=false){
  const el=document.getElementById('logEl');
  const d=document.createElement('div');
  d.className='log-line';
  d.innerHTML=`<span class="dot${isErr?' err':''}">${isErr?'✗':'▶'}</span><span>${msg}</span>`;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}

async function callClaude(key,prompt,maxTokens=2000){
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:maxTokens,messages:[{role:'user',content:prompt}]})
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error('کلود: '+(e.error?.message||r.status));}
  return (await r.json()).content[0].text;
}

function parseJSON(text){
  const s=text.indexOf('{'),e=text.lastIndexOf('}')+1;
  return JSON.parse(text.slice(s,e));
}

// Clamp values to stay within canvas
function cx(v){return Math.max(0,Math.min(+v||0,W));}
function cy(v){return Math.max(0,Math.min(+v||0,H));}
function cw(x,v){return Math.max(10,Math.min(+v||100,W-cx(x)));}
function ch(y,v){return Math.max(10,Math.min(+v||50,H-cy(y)));}

function roundRect(ctx,x,y,w,h,r,fill,stroke,sw=2){
  r=Math.min(Math.abs(r||8),w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=sw;ctx.stroke();}
}

function drawArrow(ctx,x1,y1,x2,y2,color,lw=2){
  ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=lw;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  const a=Math.atan2(y2-y1,x2-x1),s=12;
  ctx.beginPath();ctx.moveTo(x2,y2);
  ctx.lineTo(x2-s*Math.cos(a-0.4),y2-s*Math.sin(a-0.4));
  ctx.lineTo(x2-s*Math.cos(a+0.4),y2-s*Math.sin(a+0.4));
  ctx.closePath();ctx.fill();
}

function wrapText(ctx,text,x,y,maxW,lineH){
  if(!text)return 0;
  const words=String(text).split(' ');
  let lines=[],cur='';
  for(const w of words){
    const t=cur?cur+' '+w:w;
    if(ctx.measureText(t).width>maxW&&cur){lines.push(cur);cur=w;}
    else cur=t;
  }
  if(cur)lines.push(cur);
  lines.forEach((l,i)=>ctx.fillText(l,x,y+i*lineH));
  return lines.length;
}

function drawTable(ctx,x,y,w,h,headers,rows,hBg,hTxt,rBg1,rBg2,tColor,fs=14){
  if(!headers||!headers.length)return;
  const cols=headers.length, allRows=(rows||[]).slice(0,8);
  const rowH=Math.min(h/(allRows.length+1), 50);
  const colW=w/cols;
  
  // Header
  ctx.fillStyle=hBg||'#1e40af';
  ctx.fillRect(x,y,w,rowH);
  ctx.fillStyle=hTxt||'#ffffff';
  ctx.font=`bold ${fs}px Vazirmatn,Arial`;
  ctx.textAlign='center';
  headers.forEach((h,i)=>ctx.fillText(String(h),x+(cols-1-i)*colW+colW/2,y+rowH/2+fs/3));
  
  // Rows
  allRows.forEach((row,ri)=>{
    ctx.fillStyle=ri%2===0?(rBg1||'rgba(255,255,255,0.05)'):(rBg2||'rgba(255,255,255,0.1)');
    ctx.fillRect(x,y+(ri+1)*rowH,w,rowH);
    ctx.fillStyle=tColor||'#ffffff';
    ctx.font=`${fs}px Vazirmatn,Arial`;
    (row||[]).forEach((cell,ci)=>ctx.fillText(String(cell||''),x+(cols-1-ci)*colW+colW/2,y+(ri+1)*rowH+rowH/2+fs/3));
  });
  
  // Grid lines
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;
  for(let i=0;i<=allRows.length+1;i++){ctx.beginPath();ctx.moveTo(x,y+i*rowH);ctx.lineTo(x+w,y+i*rowH);ctx.stroke();}
  for(let i=0;i<=cols;i++){ctx.beginPath();ctx.moveTo(x+i*colW,y);ctx.lineTo(x+i*colW,y+(allRows.length+1)*rowH);ctx.stroke();}
  ctx.textAlign='start';
}

function drawPie(ctx,cx,cy,r,data,colors){
  if(!data||!data.length)return;
  const total=data.reduce((s,d)=>s+(+d.value||0),0);
  if(!total)return;
  let start=-Math.PI/2;
  data.forEach((d,i)=>{
    const slice=(+d.value/total)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,start+slice);ctx.closePath();
    ctx.fillStyle=colors[i%colors.length];ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    const mid=start+slice/2;
    const pct=Math.round(+d.value);
    if(pct>5){
      ctx.fillStyle='#fff';ctx.font='bold 13px Arial';ctx.textAlign='center';
      ctx.fillText(pct+'%',cx+(r*0.65)*Math.cos(mid),cy+(r*0.65)*Math.sin(mid)+5);
    }
    start+=slice;
  });
  // Legend
  data.forEach((d,i)=>{
    const ly=cy-r+(i*22);
    if(ly<cy+r+40){
      ctx.fillStyle=colors[i%colors.length];ctx.fillRect(cx+r+15,ly,14,14);
      ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='12px Vazirmatn,Arial';ctx.textAlign='start';
      ctx.fillText(String(d.label||''),cx+r+35,ly+12);
    }
  });
  ctx.textAlign='start';
}

function drawBar(ctx,x,y,w,h,data,colors){
  if(!data||!data.length)return;
  const maxVal=Math.max(...data.map(d=>+d.value||0));
  if(!maxVal)return;
  const barW=(w-(data.length+1)*6)/data.length;
  data.forEach((d,i)=>{
    const barH=Math.max(4,(+d.value/maxVal)*(h-45));
    const bx=x+6+i*(barW+6);
    const by=y+h-45-barH;
    const grad=ctx.createLinearGradient(bx,by,bx,by+barH);
    grad.addColorStop(0,colors[i%colors.length]);
    grad.addColorStop(1,colors[i%colors.length]+'88');
    roundRect(ctx,bx,by,barW,barH,4,null);
    ctx.fillStyle=grad;ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 12px Arial';ctx.textAlign='center';
    ctx.fillText(String(+d.value||0),bx+barW/2,by-5);
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='11px Vazirmatn,Arial';
    const lbl=String(d.label||'');
    ctx.fillText(lbl.length>7?lbl.slice(0,7)+'..':lbl,bx+barW/2,y+h-8);
  });
  ctx.textAlign='start';
}

async function renderSlide(palette,elements){
  const canvas=document.createElement('canvas');
  canvas.width=W;canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle=palette.background;ctx.fillRect(0,0,W,H);

  const COLORS=[palette.primary,palette.accent,palette.secondary,'#ef4444','#10b981','#8b5cf6','#f97316'];

  for(const e of elements){
    try{
      const t=e.type;
      const x=cx(e.x),y=cy(e.y),w=cw(e.x,e.w),h=ch(e.y,e.h);
      const color=e.color||palette.primary;

      if(t==='gradient_bg'){
        const grd=ctx.createLinearGradient(0,0,0,H);
        grd.addColorStop(0,e.color1||palette.background);
        grd.addColorStop(1,e.color2||palette.secondary);
        ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
      }
      else if(t==='header_band'){
        if(e.gradient_end){
          const grd=ctx.createLinearGradient(0,y,W,y);
          grd.addColorStop(0,color);grd.addColorStop(1,e.gradient_end);
          ctx.fillStyle=grd;
        }else ctx.fillStyle=color;
        ctx.fillRect(0,y,W,h);
      }
      else if(t==='footer_band'){
        ctx.fillStyle=color;ctx.fillRect(0,H-h,W,h);
      }
      else if(t==='rect'){
        roundRect(ctx,x,y,w,h,+e.radius||8,color,e.border||null,+e.border_width||2);
      }
      else if(t==='text'){
        const sz=Math.min(+e.size||18,72);
        ctx.font=`${e.bold?'bold ':''} ${sz}px Vazirmatn,Arial`;
        ctx.fillStyle=color;
        ctx.fillText(String(e.text||''),x,y+sz);
      }
      else if(t==='text_wrapped'){
        const sz=Math.min(+e.size||16,60);
        ctx.font=`${e.bold?'bold ':''} ${sz}px Vazirmatn,Arial`;
        ctx.fillStyle=color;
        wrapText(ctx,String(e.text||''),x,y+sz,+e.max_w||w||300,sz+6);
      }
      else if(t==='arrow'){
        drawArrow(ctx,x,y,cx(e.x2||x+100),cy(e.y2||y),color,+e.line_width||2);
      }
      else if(t==='line'){
        ctx.strokeStyle=color;ctx.lineWidth=+e.line_width||2;
        ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(cx(e.x2||x+w),cy(e.y2||y));ctx.stroke();
      }
      else if(t==='divider'){
        if(e.gradient_end){
          const grd=ctx.createLinearGradient(x,y,x+w,y);
          grd.addColorStop(0,color);grd.addColorStop(1,e.gradient_end);
          ctx.fillStyle=grd;
        }else ctx.fillStyle=color;
        ctx.fillRect(x,y,w,Math.max(1,+e.thickness||3));
      }
      else if(t==='icon_box'){
        const bc=e.box_color||palette.primary;
        roundRect(ctx,x,y,w,h,+e.radius||10,bc,e.border||null);
        const tc=e.text_color||'#ffffff';
        const ts=Math.min(+e.title_size||16,28),bs=Math.min(+e.body_size||13,22);
        ctx.fillStyle=tc;
        ctx.font=`bold ${ts}px Vazirmatn,Arial`;
        wrapText(ctx,String(e.title||''),x+10,y+ts+8,w-20,ts+4);
        ctx.font=`${bs}px Vazirmatn,Arial`;
        ctx.fillStyle=tc+'bb';
        wrapText(ctx,String(e.body||''),x+10,y+ts+28,w-20,bs+4);
      }
      else if(t==='number_highlight'){
        const bc=e.box_color||palette.accent;
        roundRect(ctx,x,y,w,h,+e.radius||12,bc);
        const ns=Math.min(+e.number_size||52,80);
        ctx.fillStyle=e.number_color||'#ffffff';
        ctx.font=`900 ${ns}px Vazirmatn,Arial`;
        ctx.textAlign='center';
        ctx.fillText(String(e.number||''),x+w/2,y+ns+8);
        ctx.font=`${Math.min(+e.label_size||14,22)}px Vazirmatn,Arial`;
        ctx.fillStyle=(e.label_color||'#ffffff')+'cc';
        ctx.fillText(String(e.label||''),x+w/2,y+h-10);
        ctx.textAlign='start';
      }
      else if(t==='step_boxes'){
        const steps=e.steps||[];
        const sw=+e.step_w||Math.min(220,(W-80)/Math.max(steps.length,1)-20);
        const sh=+e.step_h||120;
        const gap=+e.gap||Math.min(50,(W-80-steps.length*sw)/(steps.length-1||1));
        const colors=e.colors||COLORS;
        steps.forEach((step,i)=>{
          const sx=x+i*(sw+gap);
          if(sx+sw>W)return;
          roundRect(ctx,sx,y,sw,sh,12,colors[i%colors.length]);
          ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(sx,y,sw,sh*0.35);
          ctx.fillStyle='rgba(255,255,255,0.95)';ctx.font=`bold 20px Arial`;ctx.textAlign='center';
          ctx.fillText(String(i+1),sx+sw/2,y+sh*0.25);
          ctx.font=`bold 13px Vazirmatn,Arial`;ctx.fillStyle='#fff';
          wrapText(ctx,String(step.title||''),sx+8,y+sh*0.42,sw-16,16);
          ctx.font=`11px Vazirmatn,Arial`;ctx.fillStyle='rgba(255,255,255,0.75)';
          wrapText(ctx,String(step.body||''),sx+8,y+sh*0.65,sw-16,14);
          if(i<steps.length-1)drawArrow(ctx,sx+sw+5,y+sh/2,sx+sw+gap-5,y+sh/2,'rgba(255,255,255,0.6)',2);
          ctx.textAlign='start';
        });
      }
      else if(t==='table'){
        drawTable(ctx,x,y,w,h,e.headers,e.rows,e.header_bg||palette.primary,e.header_text||'#fff',e.row_bg1,e.row_bg2,e.text_color||palette.text||'#fff',+e.font_size||14);
      }
      else if(t==='pie_chart'){
        const r=Math.min(w,h)/2-10;
        drawPie(ctx,x+r+10,y+r+10,r,e.data||[],e.colors||COLORS);
      }
      else if(t==='bar_chart'){
        drawBar(ctx,x,y,w,h,e.data||[],e.colors||COLORS);
      }
      else if(t==='image_placeholder'){
        roundRect(ctx,x,y,w,h,+e.radius||12,e.bg_color||palette.secondary||'#1e3a5f');
        ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=2;ctx.setLineDash([6,4]);
        roundRect(ctx,x+6,y+6,w-12,h-12,8,null,'rgba(255,255,255,0.25)');
        ctx.setLineDash([]);
        ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='40px Arial';ctx.textAlign='center';
        ctx.fillText('📷',x+w/2,y+h/2+5);
        ctx.font='14px Vazirmatn,Arial';ctx.fillStyle='rgba(255,255,255,0.55)';
        ctx.fillText(String(e.label||'تصویر'),x+w/2,y+h/2+32);
        ctx.textAlign='start';
      }
      else if(t==='progress_bar'){
        const pct=Math.min(Math.max(+e.percent||0,0),100)/100;
        roundRect(ctx,x,y,w,h,h/2,e.bg||'rgba(255,255,255,0.1)');
        if(pct>0){
          const grd=ctx.createLinearGradient(x,y,x+w,y);
          grd.addColorStop(0,e.color1||palette.primary);grd.addColorStop(1,e.color2||palette.accent);
          roundRect(ctx,x,y,w*pct,h,h/2,null);ctx.fillStyle=grd;ctx.fill();
        }
        if(e.label){
          ctx.fillStyle=e.text_color||'#fff';ctx.font=`bold ${+e.font_size||14}px Vazirmatn,Arial`;
          ctx.textAlign='center';ctx.fillText(String(e.label),x+w/2,y+h/2+5);ctx.textAlign='start';
        }
      }
    }catch(err){console.warn('elem err:',e.type,err);}
  }
  return canvas.toDataURL('image/png').split(',')[1];
}

function buildZip(files){
  const enc=new TextEncoder();
  function b64(s){const b=atob(s);const u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
  function u32(n){return[n&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>24)&0xFF];}
  function u16(n){return[n&0xFF,(n>>8)&0xFF];}
  function crc32(d){let c=0xFFFFFFFF;const t=[];for(let i=0;i<256;i++){let x=i;for(let j=0;j<8;j++)x=(x&1)?(0xEDB88320^(x>>>1)):(x>>>1);t[i]=x;}for(let i=0;i<d.length;i++)c=t[(c^d[i])&0xFF]^(c>>>8);return(c^0xFFFFFFFF)>>>0;}
  const parts=[],cd=[];let offset=0;
  for(const[name,content]of Object.entries(files)){
    const nb=enc.encode(name);
    const data=name.endsWith('.png')?b64(content):enc.encode(content);
    const crc=crc32(data);
    const local=new Uint8Array([0x50,0x4B,0x03,0x04,...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),...u32(crc),...u32(data.length),...u32(data.length),...u16(nb.length),...u16(0),...nb,...data]);
    parts.push(local);cd.push({nb,crc,size:data.length,offset});offset+=local.length;
  }
  const cdParts=[];let cdSize=0;
  for(const e of cd){
    const entry=new Uint8Array([0x50,0x4B,0x01,0x02,...u16(20),...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),...u32(e.crc),...u32(e.size),...u32(e.size),...u16(e.nb.length),...u16(0),...u16(0),...u16(0),...u16(0),...u32(0),...u32(e.offset),...e.nb]);
    cdParts.push(entry);cdSize+=entry.length;
  }
  const eocd=new Uint8Array([0x50,0x4B,0x05,0x06,...u16(0),...u16(0),...u16(cd.length),...u16(cd.length),...u32(cdSize),...u32(offset),...u16(0)]);
  const all=[...parts,...cdParts,eocd];
  const total=all.reduce((s,p)=>s+p.length,0);
  const result=new Uint8Array(total);let pos=0;
  for(const p of all){result.set(p,pos);pos+=p.length;}
  return new Blob([result],{type:'application/vnd.openxmlformats-officedocument.presentationml.presentation'});
}

function makePPTX(images){
  const n=images.length,files={};
  let ct=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Default Extension="png" ContentType="image/png"/><Override PartName="/ppt/presentation.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.presentation.main+xml"/><Override PartName="/ppt/slideLayouts/slideLayout1.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slideLayout+xml"/><Override PartName="/ppt/slideMasters/slideMaster1.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slideMaster+xml"/>`;
  for(let i=1;i<=n;i++)ct+=`<Override PartName="/ppt/slides/slide${i}.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slide+xml"/>`;
  ct+=`</Types>`;
  files['[Content_Types].xml']=ct;
  files['_rels/.rels']=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="ppt/presentation.xml"/></Relationships>`;
  let sids='';for(let i=1;i<=n;i++)sids+=`<p:sldId id="${256+i}" r:id="rId${i}"/>`;
  files['ppt/presentation.xml']=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><p:presentation xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"><p:sldMasterIdLst><p:sldMasterId id="2147483648" r:id="rIdM1"/></p:sldMasterIdLst><p:sldSz cx="9144000" cy="5143500"/><p:notesSz cx="6858000" cy="9144000"/><p:sldIdLst>${sids}</p:sldIdLst></p:presentation>`;
  let pr=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rIdM1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slideMaster" Target="slideMasters/slideMaster1.xml"/>`;
  for(let i=1;i<=n;i++)pr+=`<Relationship Id="rId${i}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slide" Target="slides/slide${i}.xml"/>`;
  pr+=`</Relationships>`;
  files['ppt/_rels/presentation.xml.rels']=pr;
  files['ppt/slideMasters/slideMaster1.xml']=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><p:sldMaster xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"><p:cSld><p:spTree><p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr><p:grpSpPr/></p:spTree></p:cSld><p:clrMap bg1="lt1" tx1="dk1" bg2="lt2" tx2="dk2" accent1="accent1" accent2="accent2" accent3="accent3" accent4="accent4" accent5="accent5" accent6="accent6" hlink="hlink" folHlink="folHlink"/><p:sldLayoutIdLst><p:sldLayoutId id="2147483649" r:id="rId1"/></p:sldLayoutIdLst></p:sldMaster>`;
  files['ppt/slideMasters/_rels/slideMaster1.xml.rels']=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slideLayout" Target="../slideLayouts/slideLayout1.xml"/></Relationships>`;
  files['ppt/slideLayouts/slideLayout1.xml']=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><p:sldLayout xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" type="blank"><p:cSld><p:spTree><p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr><p:grpSpPr/></p:spTree></p:cSld></p:sldLayout>`;
  files['ppt/slideLayouts/_rels/slideLayout1.xml.rels']=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slideMaster" Target="../slideMasters/slideMaster1.xml"/></Relationships>`;
  for(let i=1;i<=n;i++){
    files[`ppt/media/image${i}.png`]=images[i-1];
    files[`ppt/slides/slide${i}.xml`]=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><p:sld xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"><p:cSld><p:spTree><p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr><p:grpSpPr/><p:pic><p:nvPicPr><p:cNvPr id="2" name="img"/><p:cNvPicPr><a:picLocks noChangeAspect="1"/></p:cNvPicPr><p:nvPr/></p:nvPicPr><p:blipFill><a:blip r:embed="rId1"/><a:stretch><a:fillRect/></a:stretch></p:blipFill><p:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="9144000" cy="5143500"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></p:spPr></p:pic></p:spTree></p:cSld></p:sld>`;
    files[`ppt/slides/_rels/slide${i}.xml.rels`]=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="../media/image${i}.png"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slideLayout" Target="../slideLayouts/slideLayout1.xml"/></Relationships>`;
  }
  return buildZip(files);
}

async function build(){
  const cKey=document.getElementById('claudeKey').value.trim();
  const topic=document.getElementById('topic').value.trim();
  if(!cKey){alert('لطفاً کلید کلود را وارد کنید');return;}
  if(!topic){alert('لطفاً موضوع را وارد کنید');return;}

  const ud={
    topic,subtopic:document.getElementById('subtopic').value,
    audience:document.getElementById('audience').value,
    goal:document.getElementById('goal').value,
    style:document.getElementById('style').value,
    tone:document.getElementById('tone').value,
    slides:+document.getElementById('slides').value,
    color:document.getElementById('color').value,
    theme:document.getElementById('theme').value,
    brand:document.getElementById('brand').value,
    hashtags:document.getElementById('hashtags').value,
    instagram:document.getElementById('instagram').value,
    phone:document.getElementById('phone').value,
    website:document.getElementById('website').value,
  };

  document.querySelector('.btn').disabled=true;
  document.getElementById('prog').classList.add('show');
  document.getElementById('res').classList.remove('show');
  document.getElementById('errEl').classList.remove('show');
  document.getElementById('logEl').innerHTML='';

  try{
    addLog('مرحله ۱: کلود در حال طراحی ساختار کلی...');

    const sp=`You are a world-class presentation architect. Create a stunning presentation plan.

IMPORTANT: Canvas is 1280x720 pixels. ALL coordinates must be within these bounds!
- x must be between 0 and 1280
- y must be between 0 and 680  
- x+w must not exceed 1280
- y+h must not exceed 720

User Info:
Topic: ${ud.topic}
Subtopic: ${ud.subtopic||'none'}
Audience: ${ud.audience||'general'}
Goal: ${ud.goal||'inform'}
Style: ${ud.style}
Slides: ${ud.slides}
Color: ${ud.color}
Theme: ${ud.theme}

Choose a beautiful color palette. For ${ud.theme==='dark'?'dark':'light'} theme.

Return ONLY this JSON:
{
  "palette":{"background":"#hex","primary":"#hex","secondary":"#hex","accent":"#hex","text":"#hex","surface":"#hex"},
  "slides":[{"number":1,"title":"Persian title","subtitle":"Persian subtitle","focus":"main point","layout":"stats|process|comparison|table_data|overview|intro|closing","needs_table":false,"needs_chart":false,"chart_type":"bar|pie|none","needs_image":true}]
}`;

    const st=await callClaude(cKey,sp,1200);
    const structure=parseJSON(st);
    const palette=structure.palette;
    const slidesInfo=structure.slides;
    addLog(`ساختار آماده: ${slidesInfo.length} اسلاید ✓`);

    const slideImages=[];

    for(let i=0;i<slidesInfo.length;i++){
      const slide=slidesInfo[i];
      addLog(`اسلاید ${i+1}: "${slide.title}"...`);

      const ep=`You are a world-class infographic designer. Design ONE slide.

CRITICAL: Canvas is exactly 1280x720 pixels!
- x range: 0 to 1270
- y range: 0 to 710
- All elements MUST fit within 1280x720
- Header is usually y:0, h:90-100
- Footer is usually h:50-60 (drawn from bottom)
- Content area: y:100 to y:660

Slide info:
Title: ${slide.title}
Subtitle: ${slide.subtitle||''}
Focus: ${slide.focus}
Layout: ${slide.layout}
Needs table: ${slide.needs_table}
Needs chart: ${slide.needs_chart} (${slide.chart_type})
Needs image placeholder: ${slide.needs_image}

Colors:
background: ${palette.background}
primary: ${palette.primary}
secondary: ${palette.secondary}
accent: ${palette.accent}
text: ${palette.text}
surface: ${palette.surface}

Brand: ${ud.brand||''}
Hashtags: ${ud.hashtags||''}
Instagram: ${ud.instagram||''}
Phone: ${ud.phone||''}

DESIGN RULES:
1. FILL the entire slide - no large empty areas
2. Use VARIED elements - not all the same type
3. Persian text must be ACCURATE and meaningful
4. Use gradient backgrounds for visual depth
5. Include brand info in footer if provided
6. Make it look like a TOP consulting presentation
7. ALL y coordinates must be < 680, ALL x < 1260

ELEMENT TYPES (use exact format):
{"type":"gradient_bg","color1":"#hex","color2":"#hex"}
{"type":"header_band","y":0,"h":95,"color":"#hex","gradient_end":"#hex"}
{"type":"footer_band","h":55,"color":"#hex"}
{"type":"rect","x":50,"y":120,"w":400,"h":200,"color":"#hex","radius":12,"border":"#hex"}
{"type":"text","x":50,"y":30,"text":"Persian text","size":38,"color":"#hex","bold":true}
{"type":"text_wrapped","x":50,"y":120,"text":"Persian text","size":16,"color":"#hex","max_w":400,"bold":false}
{"type":"arrow","x":300,"y":300,"x2":450,"y2":300,"color":"#hex","line_width":3}
{"type":"divider","x":50,"y":110,"w":1180,"color":"#hex","thickness":3,"gradient_end":"#hex"}

{"type":"number_highlight","x":50,"y":120,"w":250,"h":160,"number":"422M","label":"Persian label","box_color":"#hex","number_color":"#hex","label_color":"#hex","number_size":52,"label_size":14,"radius":12}
{"type":"step_boxes","x":40,"y":150,"steps":[{"title":"Persian","body":"Persian"}],"step_w":240,"step_h":130,"gap":30,"colors":["#hex","#hex"]}

{"type":"bar_chart","x":50,"y":150,"w":600,"h":400,"data":[{"value":80,"label":"Persian"}],"colors":["#hex"]}

      let elements=[];
      for(let att=0;att<3;att++){
        try{
          const et=await callClaude(cKey,ep,2500);
          const parsed=parseJSON(et);
          elements=parsed.elements||[];
          if(elements.length>=3)break;
        }catch(err){
          if(att===2){
            elements=[
              {type:'gradient_bg',color1:palette.background,color2:palette.secondary},
              {type:'header_band',y:0,h:95,color:palette.primary,gradient_end:palette.secondary},
              {type:'text_wrapped',x:50,y:25,text:slide.title,size:38,color:'#ffffff',max_w:1180,bold:true},
              {type:'text_wrapped',x:50,y:72,text:slide.subtitle||slide.focus,size:18,color:'rgba(255,255,255,0.8)',max_w:900},
              {type:'divider',x:50,y:105,w:1180,color:palette.accent,thickness:3},
              {type:'text_wrapped',x:50,y:140,text:slide.focus,size:20,color:palette.text||'#ffffff',max_w:1180},
            ];
          }
        }
      }

      addLog(`  ${elements.length} المان ✓`);
      const img=await renderSlide(palette,elements);
      slideImages.push(img);
      addLog(`  اسلاید ${i+1} رندر شد ✓`);
    }

    addLog('در حال ساخت فایل پاورپوینت...');
    const blob=makePPTX(slideImages);
    const url=URL.createObjectURL(blob);
    document.getElementById('dlBtn').href=url;
    document.getElementById('res').classList.add('show');
    document.getElementById('prog').classList.remove('show');

  }catch(e){
    document.getElementById('errEl').classList.add('show');
    document.getElementById('errMsg').textContent=e.message;
    addLog(e.message,true);
  }finally{
    document.querySelector('.btn').disabled=false;
  }
}
